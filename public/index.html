<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好久不见</title>
  <style>
    /* ── 重置 & 基础 ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #7c5cbf; /* vivid violet   */
      --c2: #2aa87a; /* vivid sage     */
      --c3: #e05580; /* vivid rose     */
      --c4: #2a7fd4; /* vivid blue     */
      --c5: #d4820a; /* vivid amber    */
      --radius: 14px;
      --shadow: 0 2px 24px rgba(0,0,0,.055);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC',
                   'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
    }



    /* ── Hero（占视口 1/3，最少 260px）────────────────────── */
    .hero {
      min-height: 33.33vh;
      min-height: 33.33dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem 3rem;
      background: transparent;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .hero-title {
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 800;
      letter-spacing: .06em;
      line-height: 1.45;
      text-align: center;
      /* 从左到右流动的彩色渐变 */
      background: linear-gradient(90deg,
        #9b5de5, #4361ee, #4cc9f0, #06d6a0, #ffbe0b, #f72585, #9b5de5
      );
      background-size: 280% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: waveFlow 6s linear infinite;
    }

    @keyframes waveFlow {
      0%   { background-position: 0% center; }
      100% { background-position: 280% center; }
    }

    .hero-sub {
      margin-top: 1.1rem;
      font-size: .85rem;
      letter-spacing: .14em;
      color: #555;
      font-weight: 500;
    }

    /* ── 主内容区 ──────────────────────────────────────────── */
    .main {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem 6rem;
    }

    /* ── 留言列表 ──────────────────────────────────────────── */
    .section-label {
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1.4rem;
    }

    #messages-list {
      display: flex;
      flex-direction: column;
      gap: .9rem;
      margin-bottom: 4rem;
    }

    .msg-card {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      box-shadow: var(--shadow);
      animation: fadeSlideIn .35s ease both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-header {
      display: flex;
      align-items: baseline;
      gap: .7rem;
      margin-bottom: .55rem;
    }

    .msg-nickname {
      font-size: .88rem;
      font-weight: 500;
      color: #ddd;
    }

    .msg-time {
      font-size: .72rem;
      color: #555;
      letter-spacing: .03em;
    }

    .msg-id {
      margin-left: auto;
      font-size: .68rem;
      color: #444;
      letter-spacing: .05em;
    }

    .msg-content {
      font-size: .92rem;
      line-height: 1.75;
      color: #bbb;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty-tip {
      text-align: center;
      color: #444;
      font-size: .88rem;
      padding: 3rem 0;
      letter-spacing: .08em;
    }

    /* ── 表单 ──────────────────────────────────────────────── */
    .form-card {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: var(--radius);
      padding: 2rem 1.8rem;
      box-shadow: var(--shadow);
    }

    .form-title {
      font-size: .82rem;
      letter-spacing: .18em;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-size: .75rem;
      color: #555;
      letter-spacing: .1em;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      padding: .7rem .9rem;
      font-size: .9rem;
      font-family: inherit;
      color: #e0e0e0;
      background: rgba(255,255,255,.05);
      outline: none;
      resize: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: rgba(150,130,220,.5);
      box-shadow: 0 0 0 3px rgba(130,100,200,.1);
    }

    textarea { min-height: 110px; line-height: 1.65; }

    .char-count {
      text-align: right;
      font-size: .68rem;
      color: #ccc;
      margin-top: .25rem;
    }

    .char-count.warn { color: #d0916a; }

    .btn-submit {
      width: 100%;
      padding: .8rem;
      border: none;
      border-radius: 9px;
      background: #2a2a2a;
      color: #fff;
      font-family: inherit;
      font-size: .88rem;
      letter-spacing: .12em;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: .4rem;
    }

    .btn-submit:hover  { background: #444; }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { background: #ccc; cursor: default; }

    /* ── Toast 提示 ────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #2a2a2a;
      color: #fff;
      padding: .65rem 1.4rem;
      border-radius: 24px;
      font-size: .82rem;
      letter-spacing: .06em;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── 响应式 ────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .hero { min-height: 28vh; padding: 3rem 1.2rem 2.4rem; }
      .main { padding: 2rem 1rem 5rem; }
    }

    /* ── 萤火虫画布 ─────────────────────────────────────────── */
    #fireflies-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* 让主内容在画布上层 */
    .hero, .main { position: relative; z-index: 1; }
  </style>
</head>
<body>

  <!-- ── 萤火虫画布 ── -->
  <canvas id="fireflies-canvas"></canvas>

  <!-- ── Hero ── -->
  <header class="hero">
    <h1 class="hero-title">好久不见，你有什么想对我说的吗？</h1>
    <p class="hero-sub">kakaka小星球等你很久啦～</p>
  </header>

  <!-- ── 主内容 ── -->
  <main class="main">

    <!-- 留言列表 -->
    <p class="section-label">所有留言</p>
    <div id="messages-list">
      <p class="empty-tip">暂无留言，来说第一句话吧</p>
    </div>

    <!-- 提交表单 -->
    <div class="form-card">
      <p class="form-title">留下你的话</p>
      <form id="msg-form" novalidate>

        <div class="form-row">
          <label for="nickname">昵称</label>
          <input
            type="text"
            id="nickname"
            name="nickname"
            maxlength="20"
            autocomplete="off"
          >
        </div>

        <div class="form-row">
          <label for="content">留言</label>
          <textarea
            id="content"
            name="content"
            maxlength="500"
          ></textarea>
          <div class="char-count" id="char-count">0 / 500</div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">发送</button>
      </form>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ── 工具 ────────────────────────────────────────────────
    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showToast(msg, duration = 2400) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), duration);
    }

    function formatTime(str) {
      // str: "2024-03-15 14:30:00"
      const d = new Date(str.replace(' ', 'T'));
      if (isNaN(d)) return str;
      const now = new Date();
      const diff = (now - d) / 1000; // seconds
      if (diff < 60)   return '刚刚';
      if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
      if (diff < 86400 && d.getDate() === now.getDate()) {
        return `今天 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      if (d.getDate() === yesterday.getDate() && d.getMonth() === yesterday.getMonth()) {
        return `昨天 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }
      return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    // ── 渲染留言 ────────────────────────────────────────────
    function renderMessages(list) {
      const container = document.getElementById('messages-list');
      if (!list.length) {
        container.innerHTML = '<p class="empty-tip">暂无留言，来说第一句话吧</p>';
        return;
      }
      container.innerHTML = list.map(m => `
        <article class="msg-card">
          <div class="msg-header">
            <span class="msg-nickname">${escHtml(m.nickname)}</span>
            <span class="msg-time">${formatTime(m.created_at)}</span>
            <span class="msg-id">#${m.id}</span>
          </div>
          <p class="msg-content">${escHtml(m.content)}</p>
        </article>
      `).join('');
    }

    // ── 拉取留言 ────────────────────────────────────────────
    async function loadMessages() {
      try {
        const res = await fetch('/api/messages');
        const json = await res.json();
        if (json.ok) renderMessages(json.data);
      } catch (e) {
        console.error('加载留言失败', e);
      }
    }

    // ── 字数统计 ────────────────────────────────────────────
    const contentEl  = document.getElementById('content');
    const charCount  = document.getElementById('char-count');

    contentEl.addEventListener('input', () => {
      const len = contentEl.value.length;
      charCount.textContent = `${len} / 500`;
      charCount.classList.toggle('warn', len >= 450);
    });

    // ── 提交表单 ────────────────────────────────────────────
    document.getElementById('msg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nickname = document.getElementById('nickname').value.trim();
      const content  = contentEl.value.trim();
      const btn      = document.getElementById('submit-btn');

      if (!nickname) { showToast('请填写昵称 ✦'); return; }
      if (!content)  { showToast('留言内容不能为空 ✦'); return; }

      btn.disabled = true;
      btn.textContent = '发送中…';

      try {
        const res  = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname, content }),
        });
        const json = await res.json();

        if (json.ok) {
          document.getElementById('nickname').value = '';
          contentEl.value = '';
          charCount.textContent = '0 / 500';
          charCount.classList.remove('warn');
          showToast('留言已发送 ✦');
          await loadMessages();
        } else {
          showToast(json.error || '发送失败，请重试');
        }
      } catch (err) {
        showToast('网络错误，请检查连接');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送';
      }
    });

    // ── 初始化 ──────────────────────────────────────────────
    loadMessages();

    // 每 60 秒自动刷新一次留言
    setInterval(loadMessages, 60000);

    // ── 萤火虫粒子动画（极小星点，西伯利亚风格）──────────────
    (function () {
      const canvas = document.getElementById('fireflies-canvas');
      const ctx    = canvas.getContext('2d');

      // 淡绿 + 淡蓝两色系
      const COLORS = [
        { r: 80,  g: 210, b: 150 },
        { r: 90,  g: 220, b: 160 },
        { r: 60,  g: 185, b: 255 },
        { r: 70,  g: 170, b: 255 },
        { r: 100, g: 225, b: 175 },
      ];

      const COUNT = 45;
      let W, H, flies = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function rand(a, b) { return a + Math.random() * (b - a); }

      function createFly() {
        const c = COLORS[Math.floor(Math.random() * COLORS.length)];
        return {
          x:      rand(0, W),
          y:      rand(H * 0.3, H + 40),
          r:      rand(0.4, 1.2),          // ← 极小核心
          speedY: rand(0.2, 0.65),
          speedX: rand(-0.18, 0.18),
          phase:  Math.random() * Math.PI * 2,
          freq:   rand(0.018, 0.04),
          drift:  rand(0.005, 0.012),
          color:  c,
        };
      }

      function init() {
        flies = [];
        for (let i = 0; i < COUNT; i++) {
          const f = createFly();
          f.y = rand(0, H);
          flies.push(f);
        }
      }

      let frame = 0;
      function tick() {
        frame++;
        ctx.clearRect(0, 0, W, H);

        for (const f of flies) {
          f.y -= f.speedY;
          f.x += f.speedX + Math.sin(frame * f.drift + f.phase) * 0.4;

          // sin 波闪烁
          const glow  = (Math.sin(frame * f.freq + f.phase) + 1) / 2;
          const alpha = 0.2 + glow * 0.8;

          if (f.y < -10 || f.x < -30 || f.x > W + 30) {
            Object.assign(f, createFly());
            f.y = H + 8;
          }

          const { r, g, b } = f.color;
          const halo = f.r * 5;   // ← 光晕直径很小

          // 外层柔光晕
          const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, halo);
          grad.addColorStop(0,   `rgba(${r},${g},${b},${(alpha * .55).toFixed(2)})`);
          grad.addColorStop(0.5, `rgba(${r},${g},${b},${(alpha * .18).toFixed(2)})`);
          grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);

          ctx.beginPath();
          ctx.arc(f.x, f.y, halo, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();

          // 中心亮核（极小白点）
          ctx.beginPath();
          ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${(alpha * .9).toFixed(2)})`;
          ctx.fill();
        }

        requestAnimationFrame(tick);
      }

      window.addEventListener('resize', () => { resize(); init(); });
      resize();
      init();
      tick();
    })();
  </script>
</body>
</html>
